<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorkBiFlow ATS</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f4f4f4;
        color: #333;
      }
      .container {
        width: 100%;
        max-width: 600px;
        margin: 0 auto;
        background-color: #fff;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      .header {
        background-color: rgb(39, 100, 173);
        color: #fff;
        padding: 20px;
        text-align: center;
      }
      .header h1 {
        margin: 0;
        font-size: 24px;
      }
      .content {
        padding: 20px;
        line-height: 1.6;
      }
      .content p {
        margin: 10px 0;
      }
      .button {
        display: inline-block;
        padding: 10px 20px;
        margin-top: 20px;
        background-color: #FFC727;
        color: #fff;
        text-decoration: none;
        border-radius: 4px;
        text-align: center;
      }
      .footer {
        text-align: center;
        font-size: 14px;
        padding: 10px;
        background-color: #f1f1f1;
        color: #777;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>WorkBiFlow, plateforme RH de gestion des candidatures</h1>
      </div>

      {{content}}

      <div class="footer">
        <p>&copy; {{year}} WorkBiFlow. Tous droits réservés.</p>
      </div>
    </div>
  </body>
</html>
